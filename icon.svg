  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- snowflake (fridge) -->
  <g stroke="#2f9be0" stroke-width="16" stroke-linecap="round" fill="none" transform="translate(170 256)">
    <g id="arm">
      <line x1="0" y1="0" x2="0" y2="-108"/>
