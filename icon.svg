<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e3a5f"/>
      <stop offset="1" stop-color="#0b1f33"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- "smart" connectivity arcs (like a smart-home signal) rising off the van -->
  <g fill="none" stroke="#23c3b3" stroke-width="16" stroke-linecap="round">
    <path d="M196 196 A 84 84 0 0 1 316 196"/>
    <path d="M222 168 A 48 48 0 0 1 290 168"/>
  </g>
  <circle cx="256" cy="150" r="13" fill="#23c3b3"/>

  <!-- campervan, side profile, facing right -->
  <g>
    <!-- body + sloped cab -->
    <path d="M96 360 L96 300 Q96 280 116 278 L296 278 Q318 278 330 292 L360 318 L404 326
             Q416 330 416 346 L416 360 Z" fill="#eef4fb"/>
    <!-- lower two-tone band -->
    <path d="M96 332 L416 332 L416 360 L96 360 Z" fill="#2f9be0"/>
    <!-- side windows -->
    <rect x="120" y="292" width="86" height="34" rx="8" fill="#0b1f33"/>
    <rect x="214" y="292" width="78" height="34" rx="8" fill="#0b1f33"/>
    <!-- windscreen -->
    <path d="M302 292 L324 294 L350 316 L306 316 Z" fill="#0b1f33"/>
    <!-- headlight -->
    <circle cx="406" cy="338" r="6" fill="#ffb020"/>
    <!-- wheels -->
    <circle cx="160" cy="362" r="30" fill="#0b1f33"/>
    <circle cx="160" cy="362" r="13" fill="#eef4fb"/>
    <circle cx="360" cy="362" r="30" fill="#0b1f33"/>
    <circle cx="360" cy="362" r="13" fill="#eef4fb"/>
  </g>
</svg>
